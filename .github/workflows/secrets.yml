name: Secrets

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan every commit

      # Primary scanner: gitleaks with the audited default ruleset + our
      # reviewed allowlist (.gitleaks.toml). Install the binary directly so we
      # don't depend on the org-licensed gitleaks-action.
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan git history
        run: gitleaks git . -c .gitleaks.toml --redact --no-banner

      # Backstop: the lightweight in-repo regex scanner. It hard-fails without
      # ripgrep, so install it explicitly.
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
      - run: ./scripts/check-secrets.sh
