name: Secrets

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The script hard-fails without ripgrep; install explicitly so an
      # image change can't silently remove the scanner.
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
      - run: ./scripts/check-secrets.sh
