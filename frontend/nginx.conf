# Anchor frontend — static SPA served by nginx, with /v1 proxied to the API.
# Rendered from a template at container start (envsubst substitutes
# ${BACKEND_HOST} / ${BACKEND_PORT}).

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (the app CSP can be tightened later).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    # Proxy API calls to the backend service. The frontend calls a relative
    # /v1 base, so this is what makes it work outside the Vite dev proxy.
    location /v1/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Streaming endpoints (SSE) must not be buffered.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Cache immutable, content-hashed build assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path renders index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
