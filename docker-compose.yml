services:
  db:
    image: pgvector/pgvector:pg16
    container_name: anchor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: anchor
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anchor_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anchor"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anchor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot: bring the schema up to date. Runs to completion, then exits.
  # backend/worker wait for this to succeed so migrations never race replicas.
  migrate:
    build:
      context: ./backend
    container_name: anchor-migrate
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://anchor:${POSTGRES_PASSWORD:-anchor_dev}@db:5432/anchor
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: anchor-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://anchor:${POSTGRES_PASSWORD:-anchor_dev}@db:5432/anchor
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-change-me-in-production}
      AI_DEFAULT_ENGINE: ${AI_DEFAULT_ENGINE:-ollama}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_FAST_MODEL: qwen3.5:2b
      OLLAMA_REASONING_MODEL: qwen3.5:2b
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Readiness: -f makes curl exit non-zero on the 503 the endpoint returns
    # when the DB is unreachable, so a DB-less API never reports healthy.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Background scheduler: runs proactive nudges and executes due account
  # deletions. Kept separate from the API so the web tier stays stateless.
  worker:
    build:
      context: ./backend
    container_name: anchor-worker
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "app.workers.scheduler"]
    environment:
      DATABASE_URL: postgresql+asyncpg://anchor:${POSTGRES_PASSWORD:-anchor_dev}@db:5432/anchor
      REDIS_URL: redis://redis:6379/0
      AI_DEFAULT_ENGINE: ${AI_DEFAULT_ENGINE:-ollama}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_FAST_MODEL: qwen3.5:2b
      OLLAMA_REASONING_MODEL: qwen3.5:2b
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: anchor-frontend
    restart: unless-stopped
    environment:
      BACKEND_HOST: anchor-backend
      BACKEND_PORT: "8000"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:8080"

volumes:
  pgdata:
